directories:
  output: release
  buildResources: build
appId: com.hubstore.app
productName: HubStore
files:
  - filter:
      - dist/**/*
      - node_modules/**/*
      - package.json
asar: true
asarUnpack:
  - '**/.prisma/**/*'
  - '**/@prisma/engines/**/*'
extraResources:
  - from: prisma/dev.db
    to: dev.db
win:
  target: nsis
  artifactName: HubStore-Setup-${version}.exe
npmRebuild: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
electronVersion: 41.5.0
